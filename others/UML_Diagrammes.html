      color: #111;

    }

    .page-sub {
      font-size: 12px;
      color: #666;

    }

      border: 1px solid #ccc;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 20px;
      border-radius: 8px;
    }

    .btn-row {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 28px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background: #555;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .page-title,
      .page-sub,
      .btn-row {
        display: none;
      }

      .canvas-wrap {
        border: none;
        box-shadow: none;
        padding: 0;
